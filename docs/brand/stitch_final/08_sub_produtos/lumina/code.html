<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0A0F1E"/>
  
  <!-- Estilos -->
  <defs>
    <style>
      .wordmark { font-family: 'Source Serif 4', serif; font-weight: 700; font-size: 24px; fill: #F8F9FA; }
      .separator { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 24px; fill: rgba(248, 249, 250, 0.4); }
      .product { font-family: 'Source Serif 4', serif; font-weight: 400; font-size: 24px; }
      .subtitle { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 28px; fill: #F8F9FA; }
    </style>
  </defs>

  <!-- Lockup Topo Esquerdo -->
  <g transform="translate(60, 60)">
    <text x="0" y="0" class="wordmark">DIGIAI</text>
    <text x="85" y="0" class="separator">/</text>
    <text x="105" y="0" class="product" fill="#818CF8">Lumina</text>
  </g>

  <!-- Subtítulo -->
  <text x="600" y="160" class="subtitle" text-anchor="middle">Digital signage para lojas físicas</text>

  <!-- Imagem-conceito: Textura Geométrica (Luz/Tela) -->
  <g transform="translate(240, 240)">
    <rect width="720" height="300" fill="transparent"/>
    <defs>
      <pattern id="lumina-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <rect x="0" y="0" width="38" height="38" fill="#F8F9FA" fill-opacity="0.05"/>
        <rect x="18" y="18" width="4" height="4" fill="#818CF8" fill-opacity="0.3"/>
      </pattern>
    </defs>
    <rect width="720" height="300" fill="url(#lumina-pattern)"/>
    <!-- Detalhe de acento -->
    <rect x="350" y="145" width="20" height="10" fill="#818CF8"/>
  </g>
</svg>
