<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Dark Navy -->
  <rect width="1080" height="1920" fill="#0A0F1E"/>
  
  <!-- Textura Geométrica Sutil (Linhas Verticais) -->
  <defs>
    <pattern id="vertical-lines" width="40" height="1" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="1" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1080" height="1920" fill="url(#vertical-lines)"/>

  <!-- Topo: Barra Forest Green -->
  <rect x="0" y="0" width="1080" height="4" fill="#2D4B3E"/>

  <!-- Safe Area Superior (~220px) -->
  <!-- Conteúdo começa após a safe area -->
  <g transform="translate(80, 280)">
    <!-- Tag -->
    <text x="0" y="0" fill="#F8F9FA" fill-opacity="0.8" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500" letter-spacing="0.15em">NOVIDADE DIGIAI</text>
    
    <!-- Headline -->
    <text x="0" y="100" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="84" font-weight="700" line-height="1.2">
      <tspan x="0" dy="0">Infraestrutura</tspan>
      <tspan x="0" dy="100">escalável para</tspan>
      <tspan x="0" dy="100">o novo varejo.</tspan>
    </text>
  </g>

  <!-- CTA: Deslizar (Safe Area Inferior considerada) -->
  <g transform="translate(540, 1500)">
    <rect x="-240" y="0" width="480" height="80" fill="#2D4B3E"/>
    <text x="0" y="48" fill="#F8F9FA" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="0.1em">→ DESLIZAR PARA SABER</text>
  </g>

  <!-- Footer (Dentro da Safe Area inferior, ~220px do bottom) -->
  <g transform="translate(540, 1720)">
    <text x="0" y="0" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="40" font-weight="700" text-anchor="middle" letter-spacing="0.1em">DIGIAI</text>
    <text x="0" y="40" fill="#F8F9FA" fill-opacity="0.6" font-family="Inter, sans-serif" font-size="16" font-weight="400" text-anchor="middle" letter-spacing="0.05em">PRECISION INTELLIGENCE · 2026</text>
  </g>
</svg>
