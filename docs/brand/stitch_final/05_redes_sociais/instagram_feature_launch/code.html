<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#0A0F1E"/>
  
  <!-- Textura de Grid sutil (referência ao design system) -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <!-- Top (200px) -->
  <g transform="translate(80, 100)">
    <text x="0" y="0" fill="#F8F9FA" fill-opacity="0.6" font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" letter-spacing="0.2em">LANÇAMENTO · NOVO RECURSO</text>
    <rect x="0" y="24" width="60" height="1" fill="#2D4B3E"/>
  </g>

  <!-- Centro (700px) -->
  <g transform="translate(80, 420)">
    <text x="0" y="0" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="72" font-weight="700" line-height="1.2">
      <tspan x="0" dy="0">Calculadora de lentes</tspan>
      <tspan x="0" dy="86">Clearix. Precisão</tspan>
      <tspan x="0" dy="86">geométrica em 3 cliques.</tspan>
    </text>
  </g>

  <!-- Inferior (180px) -->
  <g transform="translate(80, 900)">
    <!-- Wordmark DIGIAI à esquerda -->
    <text x="0" y="40" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="48" font-weight="700" letter-spacing="0.05em">DIGIAI</text>
    
    <!-- CTA Outlined à direita -->
    <g transform="translate(720, 0)">
      <rect x="0" y="0" width="200" height="60" stroke="#2D4B3E" stroke-width="1"/>
      <text x="100" y="38" fill="#F8F9FA" font-family="Inter, sans-serif" font-size="18" font-weight="500" text-anchor="middle" letter-spacing="0.1em">SAIBA MAIS</text>
    </g>
  </g>
</svg>
