<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

  <g transform="translate(60, 60)">

  <text x="600" y="160" class="subtitle" text-anchor="middle">Universidade / LMS AI-first</text>

  <!-- Imagem-conceito: Rede de Pontos (Knowledge Graph) -->

    <circle cx="200" cy="30" r="4" fill="#F8F9FA" fill-opacity="0.3"/>

    <circle cx="280" cy="180" r="4" fill="#F8F9FA" fill-opacity="0.3"/>

    <line x1="350" y1="100" x2="280" y2="180" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.1"/>
    <line x1="280" y1="180" x2="100" y2="200" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.1"/>
    <line x1="100" y1="200" x2="50" y2="50" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.1"/>
    <line x1="200" y1="30" x2="280" y2="180" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.1"/>
