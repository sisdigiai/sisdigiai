<!-- Micro-interactions Script -->
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            
            // Interaction visual feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check</span> <span>Acesso Autorizado</span>';
                btn.classList.remove('bg-secondary');
                btn.classList.add('bg-surface-container-highest', 'text-secondary');
            }, 1200);
        });

        // Simple mouse/touch parallax for atmospheric glow
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.bg-secondary\\/10');
            if (glow) {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.05;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.05;
                glow.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
