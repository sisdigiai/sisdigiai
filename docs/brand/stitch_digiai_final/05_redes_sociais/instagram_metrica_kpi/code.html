<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Dark Navy -->
  <rect width="1080" height="1080" fill="#0A0F1E"/>
  
  <!-- Grid sutil de infraestrutura -->
  <defs>
    <pattern id="grid-kpi" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1080" height="1080" fill="url(#grid-kpi)"/>

  <!-- Top Area: Tag Metadata -->
  <g transform="translate(80, 100)">
    <text x="0" y="0" fill="#F8F9FA" fill-opacity="0.6" font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" letter-spacing="0.15em">MÉTRICA INTERNA · MAI/2026</text>
  </g>

  <!-- Central Area: Big Number & KPI -->
  <g transform="translate(540, 520)">
    <!-- Número Gigante -->
    <text x="0" y="0" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="240" font-weight="700" text-anchor="middle">94.8%</text>
    
    <!-- Linha de detalhe Forest Green (30% da largura do post = 324px) -->
    <rect x="-162" y="40" width="324" height="2" fill="#2D4B3E"/>
    
    <!-- Subtítulo / Descrição -->
    <text x="0" y="140" fill="#F8F9FA" fill-opacity="0.8" font-family="Inter, sans-serif" font-size="28" font-weight="500" text-anchor="middle">
      <tspan x="0" dy="0">Taxa de conversão de demonstração</tspan>
      <tspan x="0" dy="40">para piloto pago</tspan>
    </text>
  </g>

  <!-- Footer Area: Wordmark & Label -->
  <g transform="translate(80, 980)">
    <!-- Wordmark DIGIAI -->
    <text x="0" y="0" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="32" font-weight="700" letter-spacing="0.1em">DIGIAI</text>
    
    <!-- Label Atualização -->
    <text x="920" y="0" fill="#F8F9FA" fill-opacity="0.4" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" text-anchor="end" letter-spacing="0.05em">ATUALIZADO MENSALMENTE</text>
  </g>
</svg>
