<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Dark Navy -->
  <rect width="1080" height="1080" fill="#0A0F1E"/>
  
  <!-- Textura de Grid sutil (referência ao design system) -->
  <defs>
    <pattern id="grid-subtle" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F8F9FA" stroke-width="1" stroke-opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1080" height="1080" fill="url(#grid-subtle)"/>

  <!-- Aspas Grandes (Canto Superior Esquerdo) -->
  <text x="80" y="240" fill="#F8F9FA" fill-opacity="0.2" font-family="Source Serif 4, serif" font-size="280" font-weight="700">“</text>

  <!-- Citação Centralizada -->
  <g transform="translate(540, 500)">
    <text x="0" y="0" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="64" font-weight="600" text-anchor="middle" line-height="1.3">
      <tspan x="0" dy="0">“Não escalamos pessoas.</tspan>
      <tspan x="0" dy="80">Escalamos sistemas</tspan>
      <tspan x="0" dy="80">operados por IA.”</tspan>
    </text>
  </g>

  <!-- Atribuição -->
  <text x="540" y="760" fill="#F8F9FA" fill-opacity="0.8" font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" text-anchor="middle" letter-spacing="0.1em">— GILBERTO C. SILVA JR · FUNDADOR DIGIAI</text>

  <!-- Wordmark Inferior -->
  <text x="540" y="980" fill="#F8F9FA" font-family="Source Serif 4, serif" font-size="32" font-weight="700" text-anchor="middle" letter-spacing="0.1em">DIGIAI</text>
</svg>
